# Declarative stack — Coolify deploys exactly what's here. GitOps: edit + push = redeploy.
services:
  web:
    image: nginxdemos/hello:plain-text
    environment:
      - SERVICE_FQDN_WEB_80        # Coolify auto-generates a domain → routes to web:80
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=${PG_PASSWORD:-changeme}
      - POSTGRES_DB=app
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
